<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Las Vegas One Piece TCG Events Schedule</title>

<!-- Discord / Open Graph preview -->
<meta property="og:title" content="Las Vegas One Piece TCG Events Schedule" />
<meta property="og:description" content="Weekly local One Piece TCG tournament schedule for Las Vegas — stores, times, formats, and prizing." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://powerlinetcg.github.io/Las-Vegas-One-Piece-TCG-Calendar/" />
<meta name="theme-color" content="#c9a84c" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:       #080808;
    --black2:      #111111;
    --black3:      #1a1a1a;
    --black4:      #242424;
    --gold:        #c9a84c;
    --gold-light:  #e8cc80;
    --gold-bright: #f5e0a0;
    --gold-dim:    rgba(201,168,76,0.15);
    --gold-border: rgba(201,168,76,0.35);
    --silver:      #c8c8d0;
    --white:       #f0f0f0;
    --muted:       #888890;
    --muted2:      #444448;
    --border:      rgba(201,168,76,0.15);
    --border2:     rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 22px 32px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--black);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    text-align: center;
  }

  .header-logo {
    height: 130px;
    width: auto;
    object-fit: contain;
  }

  .header-left h1 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--silver);
    line-height: 1.2;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-btn {
    background: var(--black3);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    width: 36px; height: 36px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'Lato', sans-serif;
  }
  .nav-btn:hover { background: var(--black4); border-color: var(--gold-light); }

  .month-label {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--white);
    min-width: 180px;
    text-align: center;
    text-transform: uppercase;
  }

  .today-btn {
    background: transparent;
    border: 1px solid var(--gold-border);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .today-btn:hover { background: var(--gold-dim); border-color: var(--gold-light); }

  /* LEGEND */
  .legend {
    padding: 9px 32px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border2);
    background: var(--black2);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* LOADING */
  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: shimmer 1.2s infinite;
    display: none;
  }
  @keyframes shimmer {
    0%   { opacity: 0.4; }
    50%  { opacity: 1; }
    100% { opacity: 0.4; }
  }
  .loading-msg {
    display: none;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .loading-spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--muted2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* CALENDAR */
  .cal-wrap { padding: 0 32px 32px; background: var(--black); }

  .dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .dow-cell {
    padding: 12px 8px 9px;
    font-family: 'Cinzel', serif;
    font-size: 9.5px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

  .day-cell {
    min-height: 135px;
    border-right: 1px solid var(--border2);
    border-bottom: 1px solid var(--border2);
    padding: 8px 6px 6px;
    vertical-align: top;
    background: var(--black);
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month { background: rgba(0,0,0,0.6); }
  .day-cell.other-month .day-num { color: var(--muted2); }
  .day-cell.is-today { background: rgba(201,168,76,0.04); }
  .day-cell.is-today .day-num {
    background: var(--gold);
    color: var(--black);
    border-radius: 50%;
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  .day-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 5px;
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* CHIPS */
  .event-chip {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    border-radius: 4px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: opacity 0.12s, transform 0.1s;
    line-height: 1.4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 3px;
    width: 100%;
    overflow: hidden;
  }
  .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
  .chip-time { font-size: 9px; font-weight: 400; opacity: 0.7; white-space: nowrap; flex-shrink: 0; }
  .event-chip:hover { opacity: 0.75; transform: translateX(1px); }

  .type-constructed { background: rgba(201,168,76,0.16); color: #e8cc80; border-left: 2px solid rgba(201,168,76,0.5); }
  .type-draft       { background: rgba(200,200,210,0.12); color: #d0d0e0; border-left: 2px solid rgba(200,200,210,0.4); }
  .type-2v2         { background: rgba(80,200,160,0.14);  color: #70d8b8; border-left: 2px solid rgba(80,200,160,0.4); }
  .type-skirmish    { background: rgba(255,80,80,0.14);   color: #ff9090; border-left: 2px solid rgba(255,80,80,0.4); }
  .type-special     { background: rgba(180,100,255,0.14); color: #cc99ff; border-left: 2px solid rgba(180,100,255,0.4); }

  /* Prizing-based chip colors */
  .prizing-box      { background: rgba(201,168,76,0.18); color: #e8cc80; border-left: 2px solid rgba(201,168,76,0.55); }
  .prizing-ppw      { background: rgba(100,160,230,0.15); color: #90c0f0; border-left: 2px solid rgba(100,160,230,0.45); }
  .prizing-ppe      { background: rgba(80,200,160,0.14);  color: #70d8b8; border-left: 2px solid rgba(80,200,160,0.4); }
  .prizing-credit   { background: rgba(200,200,210,0.12); color: #c8c8d0; border-left: 2px solid rgba(200,200,210,0.35); }
  .prizing-na       { background: rgba(100,100,105,0.15); color: #888890; border-left: 2px solid rgba(100,100,105,0.35); }
  .prizing-special  { background: rgba(180,100,255,0.14); color: #cc99ff; border-left: 2px solid rgba(180,100,255,0.4); }
  .special-event    { background: rgba(255,80,80,0.16);   color: #ff9090; border-left: 2px solid rgba(255,80,80,0.5); }

  .more-badge {
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    opacity: 0.65;
    padding: 2px 4px;
    cursor: pointer;
    display: inline-block;
    transition: opacity 0.12s;
  }
  .more-badge:hover { opacity: 1; }

  /* ALL EVENTS LIST */
  .all-ev-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid var(--border2);
    gap: 8px;
  }
  .all-ev-row:last-child { border-bottom: none; }
  .all-ev-name    { font-size: 14px; font-weight: 700; color: var(--white); margin-bottom: 3px; }
  .all-ev-details { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .all-ev-prizing { font-size: 12px; color: var(--gold); font-weight: 700; text-align: right; white-space: nowrap; margin-top: 2px; }

  /* ADHOC badge */
  .adhoc-badge {
    font-size: 9px;
    font-weight: 700;
    background: rgba(80,200,160,0.18);
    color: #70d8b8;
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 3px;
    flex-shrink: 0;
  }

  /* MODALS */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--black2);
    border: 1px solid var(--gold-border);
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    animation: pop 0.16s ease;
  }
  @keyframes pop {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-top {
    padding: 20px 22px 16px;
    background: var(--black3);
    position: relative;
  }
  .modal-top::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
  }

  .modal-store {
    font-family: 'Cinzel', serif;
    font-size: 21px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
    letter-spacing: 0.5px;
  }

  .modal-day-badge {
    display: inline-block;
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
    border: 1px solid var(--gold-border);
    color: var(--gold);
    background: var(--gold-dim);
  }

  .modal-body {
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .modal-field label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
  }

  .modal-field .val { font-size: 15px; font-weight: 400; color: var(--white); }

  .prizing-val {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.3px;
  }

  .modal-close {
    display: block;
    width: calc(100% - 44px);
    margin: 0 22px 18px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--gold-border);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-close:hover { background: var(--gold-dim); }

  .free-badge {
    font-size: 9px;
    background: var(--gold-dim);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    vertical-align: middle;
    margin-left: 4px;
    border: 1px solid var(--gold-border);
  }

  /* MOBILE AGENDA */
  .agenda-wrap { display: none; padding: 12px 16px 32px; }

  .agenda-day {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .agenda-day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    background: var(--black2);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .agenda-day-header:active { background: var(--black3); }
  .agenda-day-header.today-header {
    background: linear-gradient(135deg, var(--black3), rgba(201,168,76,0.08));
  }

  .agenda-day-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .agenda-day-header.today-header .agenda-day-name {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .agenda-day-meta { display: flex; align-items: center; gap: 10px; }

  .agenda-count {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    background: var(--black3);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .agenda-chevron {
    font-size: 11px;
    color: var(--gold);
    opacity: 0.6;
    transition: transform 0.2s;
    display: inline-block;
  }
  .agenda-day.open .agenda-chevron { transform: rotate(180deg); }

  .agenda-events { display: none; background: var(--black); }
  .agenda-day.open .agenda-events { display: block; }

  .agenda-event-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-top: 1px solid var(--border2);
    cursor: pointer;
    transition: background 0.12s;
    gap: 10px;
  }
  .agenda-event-row:active { background: var(--black2); }

  .agenda-event-left { flex: 1; min-width: 0; }

  .agenda-event-store {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .agenda-event-sub {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .agenda-type-pill {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
  }
  .agenda-type-pill.type-constructed { background: rgba(201,168,76,0.16); color: #e8cc80; }
  .agenda-type-pill.type-draft       { background: rgba(200,200,210,0.12); color: #d0d0e0; }
  .agenda-type-pill.type-2v2         { background: rgba(80,200,160,0.14);  color: #70d8b8; }
  .agenda-type-pill.type-skirmish    { background: rgba(255,80,80,0.14);   color: #ff9090; }
  .agenda-type-pill.type-special     { background: rgba(180,100,255,0.14); color: #cc99ff; }
  .agenda-type-pill.prizing-box      { background: rgba(201,168,76,0.18);  color: #e8cc80; }
  .agenda-type-pill.prizing-ppw      { background: rgba(100,160,230,0.15); color: #90c0f0; }
  .agenda-type-pill.prizing-ppe      { background: rgba(80,200,160,0.14);  color: #70d8b8; }
  .agenda-type-pill.prizing-credit   { background: rgba(200,200,210,0.12); color: #c8c8d0; }
  .agenda-type-pill.prizing-na       { background: rgba(100,100,105,0.15); color: #888890; }
  .agenda-type-pill.prizing-special  { background: rgba(180,100,255,0.14); color: #cc99ff; }
  .agenda-type-pill.special-event    { background: rgba(255,80,80,0.16);   color: #ff9090; }

  .agenda-event-right { text-align: right; flex-shrink: 0; }

  .agenda-event-time {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    display: block;
    margin-bottom: 2px;
  }

  .agenda-event-prizing { font-size: 11px; color: var(--muted); }
  .agenda-arrow { font-size: 12px; color: var(--muted2); margin-left: 4px; flex-shrink: 0; }

  /* WEEK NAV */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--black2);
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    border-radius: 10px;
  }
  .week-nav-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--gold);
    text-align: center;
    flex: 1;
    text-transform: uppercase;
  }
  .week-nav-btn {
    background: var(--black3);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'Lato', sans-serif;
    flex-shrink: 0;
  }
  .week-nav-btn:active { background: var(--black4); }
  .week-today-btn {
    background: transparent;
    border: 1px solid var(--gold-border);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 8px;
    flex-shrink: 0;
  }
  .agenda-date-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    margin-left: 6px;
    letter-spacing: 0.3px;
  }
  .agenda-day-header.is-past { opacity: 0.5; }
  .footer {
    padding: 20px 32px;
    border-top: 1px solid var(--border2);
    text-align: center;
    background: var(--black2);
  }
  .footer p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
    line-height: 1.8;
  }
  .footer span {
    color: var(--gold);
    font-weight: 700;
  }

  @media (max-width: 768px) {
    header { padding: 16px 16px 14px; flex-direction: column; align-items: center; gap: 10px; }
    header > div:first-child { display: none; }
    .header-center { gap: 6px; width: 100%; }
    .header-logo { height: 90px; }
    .header-left h1 { font-size: 11px; letter-spacing: 2px; text-align: center; }
    .nav-controls { width: 100%; justify-content: center; gap: 8px; }
    .month-label { font-size: 14px; min-width: 130px; }
    .legend { padding: 8px 16px; }
    .cal-wrap { display: none; }
    .agenda-wrap { display: block; }
  }
</style>
</head>
<body>

<header>
  <div style="width:120px;"></div>
  <div class="header-center">
    <img src="vopl-logo.png" alt="Vegas One Piece League" class="header-logo" />
    <div class="header-left">
      <h1>Las Vegas One Piece TCG Events Schedule</h1>
    </div>
  </div>
  <div class="nav-controls">
    <button class="today-btn" onclick="goToday()">Today</button>
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#e8cc80"></div>BOX*</div>
  <div class="legend-item"><div class="legend-dot" style="background:#90c0f0"></div>PPW</div>
  <div class="legend-item"><div class="legend-dot" style="background:#70d8b8"></div>PPE</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c8c8d0"></div>Store Credit</div>
  <div class="legend-item"><div class="legend-dot" style="background:#888890"></div>N/A</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff9090"></div>Special Event</div>
</div>

<div class="loading-bar" id="loadingBar"></div>
<div class="loading-msg" id="loadingMsg">
  <div class="loading-spinner"></div>
  <span>Loading schedule...</span>
</div>

<div class="cal-wrap">
  <div class="dow-row" id="dowRow"></div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="agenda-wrap" id="agendaWrap">
  <div class="week-nav">
    <button class="week-nav-btn" onclick="changeWeek(-1)">&#8592;</button>
    <span class="week-nav-label" id="weekLabel"></span>
    <button class="week-today-btn" onclick="goWeekToday()">Today</button>
    <button class="week-nav-btn" onclick="changeWeek(1)">&#8594;</button>
  </div>
  <div id="agendaDays"></div>
</div>

<!-- SINGLE EVENT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-store" id="mStore"></div>
      <div class="modal-day-badge" id="mDayBadge"></div>
    </div>
    <div class="modal-body">
      <div class="modal-field"><label>Time</label><div class="val" id="mTime"></div></div>
      <div class="modal-field"><label>Format</label><div class="val" id="mType"></div></div>
      <div class="modal-field" style="grid-column:1/-1"><label>Prizing</label><div class="prizing-val" id="mPrizing"></div></div>
    </div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- ALL EVENTS MODAL -->
<div class="modal-overlay" id="allModalOverlay" onclick="closeAllModal(event)">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-store" id="allModalTitle"></div>
      <div class="modal-day-badge" id="allModalBadge"></div>
    </div>
    <div id="allModalList" style="padding:8px 22px 4px;"></div>
    <button class="modal-close" onclick="closeAllModal()">Close</button>
  </div>
</div>

<div class="footer">
  <p>For any updates or changes to this schedule, please contact <span>AJ</span> or <span>Powerline</span> in Discord.</p>
  <p style="margin-top:4px;">* BOX prizing subject to player count requirements.</p>
</div>

<script>
const DOW_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS    = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const SHEETS = {
  recurring:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNNBxceZB_H8U_p_jzJTLjUn3y2SGPj3n9jV4lV7olpAf0tJVsAxT836p-8C7CNgu3wRl-cDBrcSz/pub?gid=0&single=true&output=csv",
  adhoc:      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNNBxceZB_H8U_p_jzJTLjUn3y2SGPj3n9jV4lV7olpAf0tJVsAxT836p-8C7CNgu3wRl-cDBrcSz/pub?gid=146815410&single=true&output=csv",
  exceptions: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQeNNBxceZB_H8U_p_jzJTLjUn3y2SGPj3n9jV4lV7olpAf0tJVsAxT836p-8C7CNgu3wRl-cDBrcSz/pub?gid=626513240&single=true&output=csv",
};

const PRIZING_MAP = {
  "BOX":          "prizing-box",
  "BOX*":         "prizing-box",
  "PPW":          "prizing-ppw",
  "PPE":          "prizing-ppe",
  "Store Credit": "prizing-credit",
  "N/A":          "prizing-na",
};
function prizingClass(prizing) { return PRIZING_MAP[prizing] || "prizing-special"; }
const TYPE_MAP = { "Constructed":"type-constructed", "Draft":"type-draft", "2 v 2":"type-2v2", "Skirmish":"type-skirmish" };
function typeClass(type) { return TYPE_MAP[type] || "type-special"; }

let curYear, curMonth;
const today = new Date();
const todayDow = today.getDay();

let RECURRING  = [];
let ADHOC      = [];
let EXCEPTIONS = [];

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/^"|"$/g, "").trim());
    return obj;
  }).filter(row => Object.values(row).some(v => v));
}

function toDateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function normalizeDate(str) {
  if (!str) return "";
  str = str.trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  const parts = str.split("/");
  if (parts.length === 3) {
    let [m, d, y] = parts.map(p => p.trim());
    if (y.length === 2) y = "20" + y;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  const dparts = str.split("-");
  if (dparts.length === 3 && dparts[0].length <= 2) {
    let [m, d, y] = dparts.map(p => p.trim());
    if (y.length === 2) y = "20" + y;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return str;
}

function isException(store, date) {
  const key = toDateKey(date);
  return EXCEPTIONS.some(e => normalizeDate(e.date) === key && e.store.toLowerCase() === store.toLowerCase());
}

function eventsForDate(date) {
  const dow = DOW_NAMES[date.getDay()];
  const key = toDateKey(date);
  const recurring = RECURRING
    .filter(e => e.day === dow && !isException(e.store, date))
    .map(e => ({ ...e, adhoc: false }));
  const adhoc = ADHOC
    .filter(e => normalizeDate(e.date) === key)
    .map(e => ({ ...e, day: dow, adhoc: true }));
  return [...recurring, ...adhoc];
}

function showLoading(on) {
  document.getElementById("loadingBar").style.display = on ? "block" : "none";
  document.getElementById("loadingMsg").style.display = on ? "flex" : "none";
}

async function fetchSheet(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("Failed to fetch " + url);
  return parseCSV(await res.text());
}

async function init() {
  curYear = today.getFullYear();
  curMonth = today.getMonth();
  showLoading(true);
  try {
    [RECURRING, ADHOC, EXCEPTIONS] = await Promise.all([
      fetchSheet(SHEETS.recurring),
      fetchSheet(SHEETS.adhoc),
      fetchSheet(SHEETS.exceptions),
    ]);
  } catch(err) {
    console.error("Schedule load error:", err);
    document.getElementById("loadingMsg").innerHTML = `
      <span style="color:var(--gold);font-size:13px;">Could not load schedule. Please refresh and try again.</span>
    `;
    return;
  }
  showLoading(false);
  render();
  renderAgenda();
}

let agendaWeekStart = null;

function getWeekStart(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function changeWeek(dir) {
  agendaWeekStart = new Date(agendaWeekStart);
  agendaWeekStart.setDate(agendaWeekStart.getDate() + dir * 7);
  renderAgenda();
}

function goWeekToday() {
  agendaWeekStart = getWeekStart(today);
  renderAgenda();
}

function renderAgenda() {
  if (!agendaWeekStart) agendaWeekStart = getWeekStart(today);

  const weekEnd = new Date(agendaWeekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);

  const fmt = d => `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
  document.getElementById("weekLabel").textContent = `${fmt(agendaWeekStart)} — ${fmt(weekEnd)}`;

  const container = document.getElementById("agendaDays");
  container.innerHTML = "";

  for (let i = 0; i < 7; i++) {
    const date = new Date(agendaWeekStart);
    date.setDate(date.getDate() + i);
    date.setHours(0,0,0,0);

    const evs = eventsForDate(date);
    const isToday = toDateKey(date) === toDateKey(today);
    const isPast  = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const dayName = DOW_NAMES[date.getDay()];
    const dateStr = `${MONTHS[date.getMonth()].slice(0,3)} ${date.getDate()}`;

    const section = document.createElement("div");
    section.className = "agenda-day" + (isToday ? " open" : "");

    const hdr = document.createElement("div");
    hdr.className = "agenda-day-header"
      + (isToday ? " today-header" : "")
      + (isPast  ? " is-past" : "");

    hdr.innerHTML = `
      <span class="agenda-day-name">
        ${isToday ? "&#9733; " : ""}${dayName}
        <span class="agenda-date-label">${dateStr}</span>
      </span>
      <div class="agenda-day-meta">
        <span class="agenda-count">${evs.length} event${evs.length !== 1 ? "s" : ""}</span>
        <span class="agenda-chevron">&#9660;</span>
      </div>
    `;
    hdr.onclick = () => section.classList.toggle("open");

    const eventList = document.createElement("div");
    eventList.className = "agenda-events";

    if (evs.length === 0) {
      eventList.innerHTML = `<div style="padding:12px 16px;font-size:12px;color:var(--muted);">No events scheduled</div>`;
    } else {
      evs.forEach(ev => {
        const row = document.createElement("div");
        row.className = "agenda-event-row";
        const isSpecial = ev.type !== "Constructed";
        const pillClass = isSpecial ? "special-event" : prizingClass(ev.prizing);
        const specialBadge = ev.adhoc ? '<span class="adhoc-badge">SPECIAL</span>' : '';
        row.innerHTML = `
          <div class="agenda-event-left">
            <div class="agenda-event-store">${ev.store} ${specialBadge}</div>
            <div class="agenda-event-sub">
              <span class="agenda-type-pill ${pillClass}">${isSpecial ? "Special Event" : ev.prizing}</span>
              <span>${ev.type}</span>
            </div>
          </div>
          <div class="agenda-event-right">
            <span class="agenda-event-time">${ev.time}</span>
          </div>
          <span class="agenda-arrow">&#8250;</span>
        `;
        row.onclick = () => openModal(ev);
        eventList.appendChild(row);
      });
    }

    section.appendChild(hdr);
    section.appendChild(eventList);
    container.appendChild(section);
  }
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  render();
}

function goToday() { curYear = today.getFullYear(); curMonth = today.getMonth(); render(); }

function render() {
  document.getElementById("monthLabel").textContent = MONTHS[curMonth] + " " + curYear;
  document.getElementById("dowRow").innerHTML = DOW_NAMES.map(d => `<div class="dow-cell">${d}</div>`).join("");
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  const firstDay    = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const prevDays    = new Date(curYear, curMonth, 0).getDate();
  for (let i = 0; i < firstDay; i++)
    grid.appendChild(makeCell(prevDays - firstDay + 1 + i, true, new Date(curYear, curMonth - 1, prevDays - firstDay + 1 + i)));
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();
    grid.appendChild(makeCell(d, false, new Date(curYear, curMonth, d), isToday));
  }
  const trail = (firstDay + daysInMonth) % 7;
  if (trail) for (let i = 1; i <= 7 - trail; i++)
    grid.appendChild(makeCell(i, true, new Date(curYear, curMonth + 1, i)));
}

function makeCell(dayNum, otherMonth, date, isToday) {
  const cell = document.createElement("div");
  cell.className = "day-cell" + (otherMonth ? " other-month" : "") + (isToday ? " is-today" : "");
  const numDiv = document.createElement("div");
  numDiv.className = "day-num";
  numDiv.textContent = dayNum;
  cell.appendChild(numDiv);
  if (!otherMonth) {
    const evs = eventsForDate(date);
    const MAX = 5;
    evs.slice(0, MAX).forEach(ev => {
      const chip = document.createElement("div");
      const isSpecial = ev.type !== "Constructed";
      chip.className = "event-chip " + (isSpecial ? "special-event" : prizingClass(ev.prizing));
      chip.innerHTML = `<span class="chip-name">${ev.store}</span>${ev.adhoc ? '<span class="adhoc-badge">SPECIAL</span>' : ''}<span class="chip-time">${ev.time}</span>`;
      chip.onclick = () => openModal(ev);
      cell.appendChild(chip);
    });
    if (evs.length > MAX) {
      const more = document.createElement("div");
      more.className = "more-badge";
      more.textContent = "+" + (evs.length - MAX) + " more";
      more.onclick = () => openAllModal(evs);
      cell.appendChild(more);
    }
  }
  return cell;
}

function openModal(ev) {
  document.getElementById("mStore").textContent = ev.store;
  document.getElementById("mDayBadge").textContent = ev.adhoc ? (ev.date || ev.day) : ev.day;
  document.getElementById("mTime").textContent = ev.time;
  document.getElementById("mType").textContent = ev.type;
  document.getElementById("mPrizing").textContent = ev.prizing;
  document.getElementById("modalOverlay").classList.add("open");
}

function openAllModal(evs) {
  const day = evs[0].day;
  document.getElementById("allModalTitle").textContent = day + " Tournaments";
  document.getElementById("allModalBadge").textContent = day;
  document.getElementById("allModalList").innerHTML = evs.map(ev => `
    <div class="all-ev-row">
      <div style="flex:1;min-width:0;">
        <div class="all-ev-name">${ev.store}</div>
        <div class="all-ev-details">${ev.time} &nbsp;·&nbsp; ${ev.type}</div>
      </div>
      <div class="all-ev-prizing">${ev.prizing}</div>
    </div>
  `).join("");
  document.getElementById("allModalOverlay").classList.add("open");
}

function closeModal(e) {
  if (!e || e.target === document.getElementById("modalOverlay"))
    document.getElementById("modalOverlay").classList.remove("open");
}

function closeAllModal(e) {
  if (!e || e.target === document.getElementById("allModalOverlay"))
    document.getElementById("allModalOverlay").classList.remove("open");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") { closeModal(); closeAllModal(); } });
init();
</script>
</body>
</html>
